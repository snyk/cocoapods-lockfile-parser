version: 2.1

orbs:
  prodsec: snyk/prodsec-orb@1

defaults: &defaults
  docker:
    - image: cimg/node:24.16

jobs:
  security-scans:
    <<: *defaults
    working_directory: ~/work
    resource_class: small
    steps:
      - checkout
      - run:
          name: Set npmjs user
          command: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
      - run:
          name: Install
          command: npm install
      - prodsec/security_scans:
          mode: auto
          release-branch: master
          open-source-additional-arguments: --exclude=test
          iac-scan: disabled

  test:
    <<: *defaults
    working_directory: ~/work
    steps:
      - checkout
      - run:
          name: Set npmjs user
          command: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
      - run:
          name: Install
          command: npm install
      - run:
          name: Lint
          command: npm run lint
      - run:
          name: Test
          command: npm test
  release:
    <<: *defaults
    working_directory: ~/work
    steps:
      - checkout
      - run:
          name: Set npmjs user
          command: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
      - run:
          name: Install
          command: npm install
      - run:
          name: Release
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx semantic-release@25.0.3

workflows:
  version: 2
  test:
    jobs:
      - prodsec/secrets-scan:
          name: Scan repository for secrets
          context:
            - snyk-bot-slack
          channel: snyk-vuln-alerts-sca
          filters:
            branches:
              ignore:
                - master
      - security-scans:
          name: Security Scans
          context:
            - open_source-managed
            - nodejs-install
      - test:
          name: Test
          context: nodejs-install
      - release:
          name: Release
          requires:
            - Test
          context:
            - github-release
            - nodejs-install
          filters:
            branches:
              only:
                - master
